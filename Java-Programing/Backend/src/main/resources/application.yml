spring:
  application:
    name: careermate-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/careermate}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}

jwt:
  secret: ${JWT_SECRET:change-me-please}
  access-token-ttl-ms: ${JWT_ACCESS_TOKEN_TTL_MS:3600000}
  refresh-token-ttl-ms: ${JWT_REFRESH_TOKEN_TTL_MS:2592000000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
